name: Reseed Qdrant corpus

# End-to-end seeding job: provisions the environment (OCR system deps, Python,
# dependencies, cached embedding model) and runs the seed against Qdrant Cloud.
# Manual only — normal deploys don't reseed; run this when the corpus changes.
on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Seeding mode"
        type: choice
        options: [incremental, force, reset]
        default: incremental
      confirm:
        description: "Required ONLY for 'reset' — type RESEED to confirm the wipe"
        required: false
        type: string

concurrency:
  group: seed-qdrant          # never run two seeds against the cluster at once
  cancel-in-progress: false

jobs:
  seed:
    name: Seed corpus
    runs-on: ubuntu-latest
    steps:
      # 'reset' wipes the collection — gate it behind an explicit confirmation.
      - name: Guard destructive reset
        if: ${{ inputs.mode == 'reset' }}
        run: |
          if [ "${{ inputs.confirm }}" != "RESEED" ]; then
            echo "::error::reset wipes the collection — type RESEED in 'confirm' to proceed."
            exit 1
          fi

      - uses: actions/checkout@v4

      # ── Environment ──────────────────────────────────────────────────────
      - name: Install OCR system deps (Tesseract + Poppler)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            tesseract-ocr tesseract-ocr-tel tesseract-ocr-hin tesseract-ocr-eng poppler-utils

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # Cache the embedding model (~2.3 GB) so reruns skip the HuggingFace download.
      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-${{ vars.EMBEDDING_MODEL || 'BAAI/bge-m3' }}

      # ── Run the seed job ─────────────────────────────────────────────────
      - name: Initialize collection + seed corpus
        env:
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          QDRANT_COLLECTION: ${{ vars.QDRANT_COLLECTION || 'assembly_kb' }}
          EMBEDDING_MODEL: ${{ vars.EMBEDDING_MODEL || 'BAAI/bge-m3' }}
          EMBEDDING_DIM: ${{ vars.EMBEDDING_DIM || '1024' }}
          INDIC_NORMALIZE: "true"
          MODE: ${{ inputs.mode }}
        run: |
          set -euo pipefail
          if [ -z "${QDRANT_URL:-}" ] || [ -z "${QDRANT_API_KEY:-}" ]; then
            echo "::error::QDRANT_URL / QDRANT_API_KEY secrets are not set"
            exit 1
          fi

          python scripts/init_qdrant.py

          case "$MODE" in
            reset) FLAG="--reset" ;;
            force) FLAG="--force" ;;
            *)     FLAG="" ;;        # incremental (delta)
          esac
          echo "Seeding in '$MODE' mode…"
          python scripts/seed_corpus.py $FLAG | tee seed.log

      - name: Publish summary
        if: always()
        run: |
          {
            echo "### Seed result — mode: \`${{ inputs.mode }}\`"
            echo ''
            echo '```'
            tail -n 25 seed.log 2>/dev/null || echo "(no output captured)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
